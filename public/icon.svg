<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f43f5e"/>
      <stop offset="0.5" stop-color="#ec4899"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="gradient2" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#f43f5e" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="120" fill="url(#gradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="128" cy="128" r="64" fill="white" fill-opacity="0.1"/>
  <circle cx="384" cy="384" r="48" fill="white" fill-opacity="0.1"/>
  <circle cx="384" cy="128" r="32" fill="white" fill-opacity="0.08"/>
  
  <!-- Shopping Bag -->
  <g filter="url(#shadow)">
    <!-- Bag body -->
    <path d="M140 180 L140 340 C140 368 164 392 192 392 L320 392 C348 392 372 368 372 340 L372 180 L140 180 Z" fill="white"/>
    
    <!-- Bag handle -->
    <path d="M180 180 C180 140 210 110 256 110 C302 110 332 140 332 180" stroke="url(#gradient)" stroke-width="16" stroke-linecap="round" fill="none"/>
    
    <!-- Handle connectors -->
    <rect x="172" y="172" width="16" height="24" rx="4" fill="url(#gradient)"/>
    <rect x="324" y="172" width="16" height="24" rx="4" fill="url(#gradient)"/>
    
    <!-- Bag shine effect -->
    <path d="M140 180 L140 340 C140 368 164 392 192 392 L256 392 L256 180 L140 180 Z" fill="url(#gradient2)"/>
    
    <!-- Shopping bag detail lines -->
    <rect x="180" y="220" width="152" height="4" rx="2" fill="url(#gradient)" fill-opacity="0.3"/>
    <rect x="180" y="240" width="120" height="4" rx="2" fill="url(#gradient)" fill-opacity="0.2"/>
    <rect x="180" y="260" width="136" height="4" rx="2" fill="url(#gradient)" fill-opacity="0.2"/>
  </g>
  
  <!-- Sparkle accents -->
  <circle cx="100" cy="200" r="8" fill="white" fill-opacity="0.6"/>
  <circle cx="420" cy="300" r="6" fill="white" fill-opacity="0.5"/>
  <circle cx="380" cy="100" r="5" fill="white" fill-opacity="0.4"/>
</svg>
